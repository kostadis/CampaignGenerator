# CampaignGenerator UI configuration
# Edit this file to set your default paths and preferences.
# The app looks for ui_config.yaml in the current working directory first,
# then falls back to this file in the CampaignGenerator directory.

# Default Claude model
model: claude-sonnet-4-20250514

# ── Campaign paths ────────────────────────────────────────────────────────────
# Set these to your campaign workspace

# Directory containing your campaign .md files (used by Connection Graph
# and as the base for all file pickers)
docs_dir: docs/

# Session summaries file (the large raw file fed to distill/campaign_state/party/planning)
summaries: ""

# prep.py config.yaml for your campaign workspace
prep_config: config/config.yaml

# ── Common output paths ───────────────────────────────────────────────────────
campaign_state_output: docs/campaign_state.md
world_state_output:    docs/world_state.md
party_output:          docs/party.md
planning_output:       docs/planning.md

# ── Tracking ──────────────────────────────────────────────────────────────────
tracking_file: docs/tracking.txt
